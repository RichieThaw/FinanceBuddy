name: Build Finance Buddy EXE
on: 
  push:
    branches: [ main ] # Runs every time you push code to the 'main' branch
  workflow_dispatch: # Allows you to start the build manually

jobs:
  build:
    runs-on: windows-latest # Tells GitHub to use a Windows cloud computer
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create Output Folders
        run: |
          mkdir out
          mkdir input

      - name: Compile Java Files
        # Assumes your .java files are in 'src/' and .jar libraries are in 'lib/'
        run: javac -d out -cp "lib/*" src/*.java

      - name: Create Main JAR
        # Packs your compiled classes into the final executable JAR
        run: jar --create --file=input/FinanceBuddy.jar --main-class=FinanceBuddy -C out .

      - name: Run jpackage
        # The cloud runner already includes the WiX Toolset needed for .exe files
        run: |
          jpackage `
            --name "FinanceBuddy" `
            --vendor "Richie" `
            --description "Modern Finance Manager" `
            --input input `
            --main-jar FinanceBuddy.jar `
            --main-class FinanceBuddy `
            --type exe `
            --win-shortcut `
            --win-menu
            
      - name: Upload Installer
        # Saves the final .exe file so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: FinanceBuddy-Windows-Installer
          path: "*.exe"
