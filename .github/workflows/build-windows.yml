name: Build Finance Buddy EXE
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Output Folders
        run: |
          mkdir out
          mkdir input

      - name: Compile Java Files
        run: javac -encoding utf8 -d out -cp "dist/lib/*;src/*" src/*.java

      - name: Create Main JAR
        # We add the Class-Path to the manifest so it looks for jars in the same folder
        run: |
          echo "Class-Path: sqlite-jdbc-3.45.2.0.jar slf4j-api-2.0.12.jar slf4j-simple-2.0.12.jar" > manifest.txt
          jar --create --file=input/FinanceBuddy.jar --main-class=FinanceBuddy --manifest=manifest.txt -C out .

      - name: Copy Libraries to Input
        run: copy dist\lib\*.jar input\

      - name: Run jpackage
        run: |
          jpackage `
            --name "FinanceBuddy" `
            --vendor "Richie" `
            --input input `
            --main-jar FinanceBuddy.jar `
            --main-class FinanceBuddy `
            --type exe `
            --win-shortcut `
            --win-menu
            
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FinanceBuddy-Windows-Installer
          path: "*.exe"        run: |
          jpackage `
            --name "FinanceBuddy" `
            --vendor "Richie" `
            --description "Modern Finance Manager" `
            --input input `
            --main-jar FinanceBuddy.jar `
            --main-class FinanceBuddy `
            --type exe `
            --win-shortcut `
            --win-menu
            
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FinanceBuddy-Windows-Installer
          path: "*.exe"
