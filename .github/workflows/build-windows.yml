name: Build Finance Buddy EXE
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Output Folders
        run: |
          mkdir out
          mkdir input

      - name: Compile Java Files
        # 🔥 Updated to look in dist/lib
        run: javac -encoding utf8 -d out -cp "dist/lib/*;src/*" src/*.java

      - name: Create Main JAR
        run: jar --create --file=input/FinanceBuddy.jar --main-class=FinanceBuddy -C out .

      - name: Copy Libraries to Input
        # 🔥 Updated to copy from dist/lib so the EXE includes the driver
        run: copy dist\lib\*.jar input\

      - name: Run jpackage
        run: |
          jpackage `
            --name "FinanceBuddy" `
            --vendor "Richie" `
            --description "Modern Finance Manager" `
            --input input `
            --main-jar FinanceBuddy.jar `
            --main-class FinanceBuddy `
            --type exe `
            --win-shortcut `
            --win-menu
            
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FinanceBuddy-Windows-Installer
          path: "*.exe"
